name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: loresmith_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d loresmith_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Run tests
        run: pytest -v
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/loresmith_test"
          GEMINI_API_KEY: "ci-placeholder"
          MIGRATION_TEST_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/loresmith_test"

      - name: Smoke eval
        run: pytest -q tests/test_eval_pipeline_smoke.py
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/loresmith_test"
          GEMINI_API_KEY: "ci-placeholder"
          MIGRATION_TEST_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/loresmith_test"

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
